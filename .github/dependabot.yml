version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Python — main packages
  - package-ecosystem: "pip"
    directory: "/hindsight-api-slim"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-api-slim-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/hindsight-api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      python-api-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
