name: Lint

# Lint gate — the same checks pre-commit hooks run locally (scripts/hooks/lint.sh),
# enforced in CI so drift cannot merge. Runs on every PR; additive to test.yml.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-lint:
    name: Python lint (ruff + ty)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: hindsight-api-slim
            dir: hindsight-api-slim
            ty_targets: hindsight_api
          - name: hindsight-dev
            dir: hindsight-dev
            ty_targets: hindsight_dev benchmarks
          - name: hindsight-embed
            dir: hindsight-embed
            ty_targets: hindsight_embed

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./${{ matrix.package.dir }}
        run: uv sync --frozen --all-extras --index-strategy unsafe-best-match

      - name: ruff check
        working-directory: ./${{ matrix.package.dir }}
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: ./${{ matrix.package.dir }}
        run: uv run ruff format --check .

      - name: ty check
        working-directory: ./${{ matrix.package.dir }}
        run: uv run ty check ${{ matrix.package.ty_targets }}

  typescript-lint:
    name: TypeScript lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=hindsight-control-plane

      - name: eslint
        working-directory: ./hindsight-control-plane
        run: npx eslint 'src/**/*.{ts,tsx}'

      - name: prettier --check
        working-directory: ./hindsight-control-plane
        run: npx prettier --check 'src/**/*.{ts,tsx}'

